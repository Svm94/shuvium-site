    <style>

            transition: all 0.3s ease;
        }
        .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.15);

        }
        .glass-card:hover { border-color: var(--shuvium-gold); background: rgba(255, 255, 255, 0.07); }
